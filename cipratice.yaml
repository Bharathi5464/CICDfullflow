name: Build and push docker image with test
on:
  push:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-latest  

    steps:
      - name: code pull for test
        uses: actions/checkout@v4
      - name: Upgrade pip
        run: pip install --upgrade pip
      - name: install dependencies
        run: pip install -r requirements.txt
      - name: run the test
        run: pytest
  docker:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: code pull for test
        uses: actions/checkout@v4
      - name: docker login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
      - name: docker image build
        run: |  
          docker build -t ${{ secrets.DOCKER_USERNAME }}/devops-ci:v2 .
      - name: docker image push
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/devops-ci:v2