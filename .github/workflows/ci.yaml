name: Build and push docker image with test
on:
  push:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-latest  

    steps:
      - name: code pull for test
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Upgrade pip
        run: pip install --upgrade pip
      - name: install dependencies
        run: pip install -r requirements.txt
      - name: run the test
        run: pytest
  docker:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: code pull for test
        uses: actions/checkout@v4
      - name: docker login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/devops-ci:latest
            ${{ secrets.DOCKER_USERNAME }}/devops-ci:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

         
  deploy_ec2:
    needs: docker
    runs-on: ubuntu-latest
    steps:
       - name: Deploy to EC2
         uses: appleboy/ssh-action@v1.2.0
         with:
           host: ${{ secrets.EC2_HOST }}
           username: ${{ secrets.EC2_USER }}
           key: ${{ secrets.EC2_SSH_KEY }}
           script: |
                docker pull ${{ secrets.DOCKER_USERNAME }}/devops-ci:latest
       
                docker stop full-flowcon || true
       
                docker rm full-flowcon || true
       
                docker run -d --name full-flowcon -p 80:5000 \
                  ${{ secrets.DOCKER_USERNAME }}/devops-ci:latest
       
                echo "Waiting for app startup..."
                sleep 5
       
                curl -f http://localhost:80 || exit 1
       
                echo "DEPLOYMENT HEALTH CHECK PASSED"
                echo "${{ github.sha }}" > /home/ec2-user/current_version.txt
                echo "Last Deployed $(date) - ${{ github.sha }}" >> /home/ec2-user/Lastdeployed_version.txt